<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommender</title>
</head>
<body>

<h1>🎬 Movie Recommender System</h1>

<input id="movie" placeholder="Enter movie name">
<button onclick="getRec()">Show Recommendation</button>

<div id="results" style="display:flex; gap:20px; margin-top:20px;"></div>

<script>
const API_KEY = "8265bd1679663a7ea12ac168da84d2e8";

async function fetchPoster(movieName) {
    const searchUrl = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${movieName}`;
    const res = await fetch(searchUrl);
    const data = await res.json();

    if (data.results.length > 0) {
        return "https://image.tmdb.org/t/p/w500/" + data.results[0].poster_path;
    }
    return "";
}

async function getRec() {
    const movie = document.getElementById("movie").value;

    const res = await fetch(`/api/recommend?movie=${movie}`);
    const data = await res.json();

    const container = document.getElementById("results");
    container.innerHTML = "";

    if (data.recommendations) {
        for (let m of data.recommendations) {
            const poster = await fetchPoster(m);

            const div = document.createElement("div");

            div.innerHTML = `
                <p>${m}</p>
                <img src="${poster}" width="150"/>
            `;

            container.appendChild(div);
        }
    } else {
        container.innerHTML = data.error;
    }
}
</script>

</body>
</html>
