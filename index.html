<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Recommender</title>

<style>
body {
    margin: 0;
    background: #0b0b0b;
    color: white;
    font-family: sans-serif;
}

.container {
    text-align: center;
    padding: 40px;
}

h1 {
    font-size: 2.5rem;
}

input {
    padding: 12px;
    width: 300px;
    border-radius: 30px;
    border: none;
    background: #1c1c1c;
    color: white;
}

button {
    padding: 12px 20px;
    border-radius: 30px;
    border: none;
    background: red;
    color: white;
    cursor: pointer;
}

.results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #141414;
    border-radius: 10px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.card p {
    padding: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎬 Movie Recommender</h1>

    <input id="movieInput" placeholder="Enter movie name...">
    <button onclick="getRecommendations()">Search</button>

    <div class="results" id="results"></div>
</div>

<script>
async function getRecommendations() {
    const movie = document.getElementById("movieInput").value;
    const resultsDiv = document.getElementById("results");

    resultsDiv.innerHTML = "Loading...";

    const res = await fetch("http://127.0.0.1:5000/recommend", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({movie: movie})
    });

    const data = await res.json();

    resultsDiv.innerHTML = "";

    data.recommendations.forEach(m => {
        resultsDiv.innerHTML += `
            <div class="card">
                <img src="${m.poster}">
                <p>${m.title}</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
